# strategies.yaml — single source of truth for the Phase 5 deterministic quant
# research candidates (AGENTS.md Section 12 strategy families; Section 13 lifecycle).
#
# Phase 5 ships REAL deterministic strategy logic (families A, B, G) as *research
# candidates* (lifecycle Stage 2-4). Each candidate runs through the SAME
# event-based engine + walk-forward + fee/slippage stress as Phase 4 (the Parity
# Rule, Section 10), and is judged against the up-front kill-criteria declared in
# configs/backtest.yaml (Section 16: "validation exists to reject").
#
# Like the Phase 4 reference fixture, there is no live/real market data offline,
# so each candidate is validated on a DETERMINISTIC reference series that plants
# the family's hypothesised causal structure (and a matching no-structure control
# that must yield ~0 expectancy — the look-ahead guard). The strategy code is
# real; the data is a labelled synthetic fixture. These are research candidates,
# NOT proven live edges (lifecycle Stage 4 → paper is Phase 8).
#
# All runtime behaviour is config-driven and versioned (Section 4): changing any
# threshold, exit-geometry, side permission, or fixture parameter is a new
# STRATEGY_VERSION.

version: 1

strategies:
  strategy_version: strat_0006  # _0005: risk_scale; _0006: basis premium-reversion exit OFF (A/B: it was a net negative)

  # Long/short expectancy is computed separately for every candidate; a side whose
  # out-of-sample expectancy_r is at or below this floor is DISABLED before
  # promotion and the candidate is re-validated on the surviving side(s)
  # (Section 16 long/short breakdown; Appendix D Phase 5 "losing side disabled").
  min_side_expectancy_r: 0.0

  # The live/demo engine runs at most this many promoted strategies at once — the top-N by
  # validated expectancy_r — so the live ensemble stays small and diversified (0 = no cap).
  max_active_strategies: 5

  candidates:
    # ----------------------------------------------------------------------- #
    # Family A — Cross-Asset Lead-Lag (Section 12.A)                           #
    # ----------------------------------------------------------------------- #
    - id: lead_lag_xasset
      family: A
      enabled: true
      # Exit geometry: momentum/short-burst — explicit initial SL for sizing,
      # time-stop, NO fixed TP (tp_frac large; the lagged move is the edge).
      exit_profile: momentum
      params:
        leader_ret_threshold: 0.0025  # leader's last-bar return must exceed this
        # Position-size scale: this edge is real OOS (hold-out +0.098R, PF 1.19) but HOT — at the
        # account standard (0.5%/trade) its drawdown is ~43%, over the 25% gate. Sized to 0.4× the
        # standard targets ~20% max drawdown (dd is ~linear in size; expectancy_r/PF unchanged).
        risk_scale: 0.4
        stop_frac: 0.012              # initial SL FLOOR (fraction of price) — anchors sizing
        tp_frac: 0.50                 # ~no fixed TP (unreachable); the trailing stop is the exit
        hold_bars: 24                 # generous time-stop BACKSTOP; the trail is the real exit
        # Volatility-scaled stop: effective SL = max(stop_frac, atr_stop_mult × atr_pct), so the
        # stop adapts to the decision timeframe (a fixed 1.2% is ~1 1h bar → noise stop-outs). On
        # the low-vol 5m fixtures atr×mult stays under the floor (unchanged); it widens on 1h/4h.
        atr_stop_mult: 1.5            # TIGHTENED 2.5→1.5: winners only dip 0.26R (MAE), losers
                                      # sink to ~0.78R — a momentum trade that digs deep is wrong,
                                      # so a tighter stop culls losers while keeping most winners.
        atr_tp_mult: 0.0              # momentum: no fixed ATR TP (see tp_r_mult below)
        # Reachable profit target: winners reach ~1.6R MFE but the loose trail booked only ~0.88R
        # (≈46% given back). Take profit at 1.3R to capture that crowd; the trailing stop still
        # exits trades that peak below the target ("higher exit + keep trail").
        tp_r_mult: 1.3
        # Trailing stop kept as the backstop: let a lagged move that DOESN'T reach the target RUN
        # and exit on reversal instead of being cut at the time-stop.
        atr_trail_mult: 2.0
        # Regime safety gate (matches live): skip the no-trade regimes (R4 chop / R7 toxic /
        # R8 unsafe). Defensible, not edge-fitted — the edge-conditional `regimes` allow-list is
        # set separately from a TRAIN-only breakdown (never the full sample we then validate on).
        block_no_trade_regimes: true
        # NOTE: an edge-conditional regimes allow-list {R1,R5,R6} was trialled here (train-selected,
        # dropping the loss regimes R2/R3). It lifted the IN-SAMPLE folds (2/5 → 4/5) but BROKE the
        # locked hold-out (pass → fail) — the classic overfitting signature the walk-forward
        # hold-out exists to catch. Reverted: regime concentration does not robustly help lead_lag.
        # (`regimes:` left unset = trade every tradeable regime; only the safety gate above applies.)
        allow_long: true
        allow_short: true
      fixture:
        seed: lead_lag_v1
        bars: 3000
        timeframe: "5m"
        leader: "BTC/USDT:USDT"
        followers: ["ETH/USDT:USDT", "SOL/USDT:USDT"]
        leader_drift: 0.0016          # peak per-bar drift of the leader trend
        leader_period_bars: 140
        leader_sigma: 0.0024
        lag_beta: 0.70                # follower bar return = lag_beta * leader prev-bar return
        follower_sigma: 0.0018        # follower idiosyncratic noise (< planted signal)

    # ----------------------------------------------------------------------- #
    # Family B — Perpetual Premium / Basis Mean Reversion (Section 12.B)       #
    # ----------------------------------------------------------------------- #
    - id: basis_reversion
      family: B
      enabled: true
      # Exit geometry: mean-reversion — near fixed TP, wider SL, asymmetric
      # (high win-rate / low R). Reversion is measured net of fees+slippage+funding.
      exit_profile: mean_reversion
      params:
        # Entry threshold kept at 0.0015 for ROBUSTNESS (2470 trades, 4/5 folds pass). Raising it to
        # 0.0025 lifts per-trade quality (train mean-fold +0.055→+0.064) BUT cuts trades ~5× and the
        # fold-pass count goes fragile (folds dip under the 0.03 floor, flickering 3–4/5) while only
        # improving the noisy hold-out — not worth trading robustness for. Documented, not taken.
        premium_threshold: 0.0015     # |premium| (mark-vs-index) must exceed this to fire
        # Premium-reversion early exit DISABLED (sentinel < 0; see BasisReversionStrategy.manage).
        # Controlled A/B on this snapshot: it booked ~-0.11R small losses (premium reverted but
        # price hadn't paid) — holding to TP/stop/time did better. The hook stays opt-in for later.
        exit_premium_frac: -1.0
        stop_frac: 0.018              # SL FLOOR (mean-reversion can run before reverting)
        tp_frac: 0.006                # near-TP FLOOR (capture the reversion)
        hold_bars: 6
        # Volatility-scaled geometry: SL = max(stop_frac, 2.0×atr_pct), TP = max(tp_frac,
        # 1.0×atr_pct). On 1h/4h the reversion target + stop scale with realized range instead of
        # being a fixed % that noise trips; the 5m fixtures stay under the floors (unchanged).
        # NOTE: tightening to 1.5×atr was TESTED on the 20-sym 4h lake and HURT the locked hold-out
        # (-0.0029 → -0.0306): stop-outs doubled, win rate fell 62.5%→59.6%. Mean-reversion needs
        # overshoot room before the revert — the MAE separation does NOT translate to a tighter SL
        # here. Kept at 2.0 (the momentum families, which DO want tight stops, are tightened).
        atr_stop_mult: 2.0
        atr_tp_mult: 1.0
        block_no_trade_regimes: true  # exclude no-trade regimes (R4 chop / R7 toxic / R8 unsafe)
        # Maker (passive-limit) entry. The 20-symbol research run showed the basis edge is THIN and
        # COST-DOMINATED (~+0.03R, win 64%): taker fee + slippage eats most of the captured
        # reversion. A mean-reversion entry is a natural maker — you WANT to be filled as price
        # dislocates TO your resting limit, not to cross the spread chasing it. Posting 0.10×atr_pct
        # inside the open captures the maker fee + zero slippage at the price of fewer fills (no
        # fill when the bar doesn't trade through the limit). Offset is a tunable: too wide starves
        # fills, 0 posts at the open (optimistic). Re-validate fill-rate + per-side expectancy.
        maker_entry: true
        limit_offset_atr_mult: 0.10
        allow_long: true              # the harness disables the structurally-weak side
        allow_short: true
      fixture:
        seed: basis_v1
        bars: 3000
        timeframe: "5m"
        symbols: ["BTC/USDT:USDT", "ETH/USDT:USDT"]
        rho: 0.86                     # OU persistence of the premium deviation
        shock_sigma: 0.0016           # premium-deviation innovation scale
        kappa_rich: 0.85              # reversion strength when perp is RICH (premium>0) -> short wins
        kappa_cheap: 0.05             # reversion strength when perp is CHEAP (premium<0) -> long weak
        noise_sigma: 0.0030           # idiosyncratic price noise

    # ----------------------------------------------------------------------- #
    # Family G — Cross-Sectional Relative Strength / Dispersion (Section 12.G) #
    # ----------------------------------------------------------------------- #
    - id: xsection_rs
      family: G
      enabled: true
      # Exit geometry: momentum (relative-strength continuation) — initial SL for
      # sizing, time-stop, no fixed TP.
      exit_profile: momentum
      params:
        rs_threshold: 0.003           # |relative strength vs cross-sectional mean| to fire
        stop_frac: 0.014              # initial SL FLOOR
        tp_frac: 0.50                 # ~no fixed TP (unreachable); the trailing stop is the exit
        hold_bars: 24                 # generous time-stop BACKSTOP; the trail is the real exit
        # TIGHTENED 2.5→1.5 (see lead_lag_xasset): winner MAE ~0.26R vs loser MAE ~0.83R.
        atr_stop_mult: 1.5
        atr_tp_mult: 0.0              # momentum: no fixed ATR TP (see tp_r_mult below)
        tp_r_mult: 1.3               # reachable target at 1.3R (winners reach ~1.67R MFE; cap give-back)
        atr_trail_mult: 2.0           # trail kept as backstop for trades that peak below the target
        block_no_trade_regimes: true  # exclude no-trade regimes (R4 chop / R7 toxic / R8 unsafe)
        allow_long: true
        allow_short: true
      fixture:
        seed: xsection_v1
        bars: 3000
        timeframe: "5m"
        # All fixtures use the 3 [VERIFIED]-metadata symbols so fees come from
        # configs/metadata.yaml (META gate), never a fallback.
        symbols: ["BTC/USDT:USDT", "ETH/USDT:USDT", "SOL/USDT:USDT"]
        market_sigma: 0.0010          # common market-factor per-bar move (small)
        idio_rho: 0.92                # persistence of idiosyncratic relative strength
        idio_shock: 0.0014            # idiosyncratic innovation scale (dispersion source)
        idio_noise: 0.0016
