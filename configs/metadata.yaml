# metadata.yaml — operator-verified exchange contract metadata (Section 6).
#
# This file is the recorded output of the Metadata Verification Workflow
# (Section 6): an operator reviewed each contract spec against the venue's
# authoritative reference and marked it [VERIFIED]. The META gate (Appendix A)
# requires every active symbol to have complete, non-contradictory, [VERIFIED],
# current-version metadata persisted in `exchange_metadata`.
#
# The Phase 2/3 venue is the OFFLINE `skeleton` exchange — a self-defined test
# venue whose authoritative reference IS this file. No live trading occurs
# (Priority Stack 1/2); when a real venue is wired behind the same adapter, a
# human re-verifies these values against the real exchange docs and bumps the
# metadata_version. Any metadata change => new version => re-verification.

version: 1

metadata:
  exchange_id: skeleton
  metadata_version: meta_0001
  verified_against: "skeleton venue contract reference v1 (offline, self-defined)"
  verified_at: "2026-06-15T00:00:00Z"

  # Order types the venue supports (required by META: "order types").
  supported_order_types:
    - "limit"
    - "market"
    - "stop_market"
    - "stop_limit"
    - "take_profit_market"

  # Per-symbol contract specs. Every field below is required by the META gate;
  # a missing or contradictory value fails the symbol.
  symbols:
    "BTC/USDT:USDT":
