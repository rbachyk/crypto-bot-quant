      contract_type: "perpetual"
      quote_currency: "USDT"
      tick_size: 0.1
      lot_size: 0.001
      qty_step: 0.001
      price_precision: 1
      min_order_size: 0.001
      min_notional: 5.0
      max_leverage: 100
      margin_mode: "isolated"
      position_mode: "one_way"
      maker_fee: 0.0002
      taker_fee: 0.00055
      funding_interval_hours: 8

    "ETH/USDT:USDT":
      status: "trading"
      contract_type: "perpetual"
      quote_currency: "USDT"
      tick_size: 0.01
      lot_size: 0.01
      qty_step: 0.01
      price_precision: 2
      min_order_size: 0.01
      min_notional: 5.0
      max_leverage: 100
      margin_mode: "isolated"
      position_mode: "one_way"
      maker_fee: 0.0002
      taker_fee: 0.00055
