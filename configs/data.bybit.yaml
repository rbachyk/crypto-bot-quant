# data.bybit.yaml — REAL-DATA data-platform contract (Bybit USDT linear perps).
#
# Opt-in counterpart to data.yaml (which stays on the offline skeleton so tests
# and gates run with no network). Point the platform at this file to download and
# validate REAL Bybit public market data into a versioned DATA_VERSION snapshot:
#
#   qbot download --exchange bybit --symbols "BTC/USDT:USDT" --days 7
#
# or load it directly:  load_data_config("configs/data.bybit.yaml").
#
# Exchange reality the settings below encode (see src/data/ccxt_source.py):
#   * OHLCV / mark / index / funding are served over long windows.
#   * open_interest is RECENT-ONLY and retained longer at coarser intervals:
#     ~16h @ 5m, ~8d @ 1h, ~33d @ 4h, ~199d @ 1d. So OI is sampled on its own
#     coarser grid (oi_timeframe) and the download window must END near "now"
#     for OI to be fully covered. For multi-week history sample OI at 4h/1d.
#   * spread has no public L1 history — it is a conservative estimate.

version: 1

data:
  exchange_id: bybit
  data_version: bybit_0002

  # Test universe: the 20 most-liquid Bybit USDT perps that listed BEFORE mid-2022 — a single
  # liquidity filter that also guarantees multi-year history AND excludes the recent tokenized
  # stock/commodity contracts (XAU/SOXL/SPCX…) and 2024 tokens that would wreck a crypto
  # cross-sectional ranking. This is a static, survivorship-biased snapshot chosen to PROVE the
  # edge exists with breadth; a point-in-time universe MANAGER (monthly rotation on liquidity +
  # listing-age, survivorship-free) replaces it once the edge is confirmed. Selected from live
  # Bybit 24h-turnover (see git history for the query).
  symbols:
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "XRP/USDT:USDT"
    - "DOGE/USDT:USDT"
    - "ZEC/USDT:USDT"
    - "ADA/USDT:USDT"
    - "NEAR/USDT:USDT"
    - "AAVE/USDT:USDT"
    - "AVAX/USDT:USDT"
    - "BNB/USDT:USDT"
    - "LINK/USDT:USDT"
    - "XLM/USDT:USDT"
    - "LTC/USDT:USDT"
    - "XMR/USDT:USDT"
    - "DYDX/USDT:USDT"
    - "UNI/USDT:USDT"
    - "DOT/USDT:USDT"
    - "OP/USDT:USDT"
    - "BCH/USDT:USDT"

  # OHLCV decision timeframes collected for every symbol.
  timeframes: ["5m", "1h", "4h"]

  # Decision timeframes whose engine inputs are PRE-BUILT (and cached) at download time, so
  # validation loads them instantly. Just 4h for now — building 1h is ~hours and 5m is days for a
  # 20-symbol universe; add "1h"/"5m" here when you want to validate on them (the first build then
  # runs once during download, cached forever after). Omit this key to pre-build every timeframe.
  prebuild_input_timeframes: ["4h"]

  # Mark / index / spread are sampled on this base grid.
  base_timeframe: "5m"

  # Open interest is sampled on a coarser grid than base because Bybit only
  # retains ~16h of 5m OI but ~8 days at 1h (set 4h/1d for longer windows).
  oi_timeframe: "1h"

  funding_interval_hours: 8

  # Multi-year history: open_interest and spread are EXCLUDED — Bybit only serves recent OI
  # (~days) and spread is a live snapshot, so requiring them caps the window to a few days and
  # fails validation. The feature pipeline defaults oi_change/spread to neutral when absent, so
  # price/basis/funding strategies validate over years. OHLCV/mark/index/funding are continuous
  # back to listing. (For a recent OI/spread study, narrow the window + re-add those series.)
  required_series: ["ohlcv", "mark", "index", "funding"]

  # ~5.5 years of history so validation has a real sample (not a 5-day window). The download is
  # large and runs in the background; symbols listed later than the start simply have a shorter
  # series (the backtest uses whatever each symbol has).
  window:
    # ``now`` anchors the END to the current time (floored to the last closed hour) at load time,
    # so the window always reaches fresh data and never goes stale. Put an ISO date here only to
    # pin a fixed historical window.
    as_of: now
    duration_hours: 48000 # ~5.5 years → back to ~Jan 2021

  validation:
    # Tolerate scattered missing candles over the multi-year window (exchange-maintenance gaps):
    # up to this many missing per series is a non-blocking WARNING, not a FAILED snapshot. The
    # data is still usable for backtests; this only governs the snapshot's "valid" flag.
    max_unfilled_gap_bars: 20000
    max_spread_bps: 250.0
    min_price: 0.0
    max_price: 1.0e12
    max_funding_misalignment_s: 1
    max_markindex_misalignment_s: 1
    clock_drift_tolerance_s: 2.0

  insufficient_history: []
