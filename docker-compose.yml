# Docker Compose — MVP single-node topology (AGENTS.md Appendix B.3 / B.12).
#
# Safety:
#   * trading-engine-live is DEFINED but DISABLED by default: it sits behind the
#     `live` compose profile, so `docker compose up` never starts it. It also
#     requires ENABLE_LIVE_TRADING=true + APP_ENV=production to even boot
#     (enforced in src.config.Settings).
#   * No real secrets here; everything comes from `.env` (see `.env.example`).
#
# Networking (deliverable: "internal network; only 443 exposed"):
#   * All services join a single private bridge network and talk over it by
#     service name (e.g. postgres:5432, backend:8000). They are NOT published.
#   * Caddy (the public TLS reverse proxy, 443) is OPT-IN behind the `proxy`
#     profile — it is used on the VPS (`docker compose --profile proxy up`) and is
#     NOT started by a local `docker compose up`. It remains the only service that
#     publishes to a PUBLIC interface.
#   * postgres/redis/dashboard are bound to 127.0.0.1 ONLY — loopback access for
#     host-run dev tooling and the local dashboard (http://127.0.0.1:8001) without
#     exposing anything on an external interface. Dashboard auth (Basic) still
#     applies, satisfying "no unauthenticated dashboard outside local".
#
# Services build from a single image and differ only by `command`.

# Container env. The whole `.env` is loaded via `env_file` below (so EXCHANGE_ENV,
# EXCHANGE_API_KEY/SECRET, ALERT_*, ENABLE_* … all reach the app). The keys here only PIN the
# infra URLs to the compose service names and re-assert safe defaults; `environment` overrides
# `env_file`, so a stray DATABASE_URL=localhost in `.env` can never point a container at itself.
x-app-env: &app-env
  APP_ENV: ${APP_ENV:-local}
  TRADING_MODE: ${TRADING_MODE:-PAPER}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_bot}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-false}
  # OFF by default: the scheduler must NOT auto-enqueue recurring paper sessions / strategy
  # validations that silently add trades to the dashboard. (The redis pause flag is ephemeral —
  # wiped whenever redis is recreated — so this env toggle is the durable off-switch.) Paper
  # runs are started MANUALLY (dashboard/CLI); this toggle does not affect those. Opt back into
  # background research by setting ENABLE_BACKGROUND_RESEARCH_JOBS=true in .env.
  ENABLE_BACKGROUND_RESEARCH_JOBS: ${ENABLE_BACKGROUND_RESEARCH_JOBS:-false}
  DASHBOARD_AUTH_MODE: ${DASHBOARD_AUTH_MODE:-basic}
  DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
  DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me-in-env}

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  # Load the operator's `.env` into every app container (required:false so a fresh checkout
  # without a `.env` still builds — values then come from `environment` defaults above).
  env_file:
    - path: .env
      required: false
  # SHARED, PERSISTENT data lake + reports across EVERY app container. Without this the parquet
  # lake lives in each container's ephemeral filesystem, so a snapshot downloaded by one worker is
  # invisible to the others (and wiped on rebuild) — real-data backtests/validation then find no
  # data and finish instantly. One named volume = one lake all services read/write.
  volumes:
    - lakedata:/app/var
    - reportsdata:/app/reports
  # Auto-restart on crash/OOM (DEPLOY gate). Merged into every app service via <<: *app-build.
  restart: unless-stopped

services:
  postgres:
    restart: unless-stopped
    image: timescale/timescaledb:2.15.3-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Loopback-only: reachable from host dev tooling, never externally exposed.
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Loopback-only: reachable from host dev tooling, never externally exposed.
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: backend
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://localhost:8000/livez').status_code==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Internal only — exposed to the outside solely through Caddy (443). The `backend`
    # service IS the dashboard + API (one FastAPI app); Caddy proxies it at https://localhost.
    expose:
      - "8000"

  # Same FastAPI app as `backend`, on its own port/process (part of the canonical B.12
  # topology the INFRA gate validates). Caddy fronts `backend`; this is a second internal
  # instance for the dashboard shell.
  dashboard:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: dashboard
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      backend:
        condition: service_started
    expose:
      - "8001"
    # Loopback-only host publish so the dashboard is reachable WITHOUT Caddy in local dev:
    # open http://127.0.0.1:8001 (bound to 127.0.0.1, so it is never externally exposed — the
    # INFRA gate's "only 443 external" check ignores loopback ports). On the VPS, front it with
    # the `proxy` profile (Caddy) instead.
    ports:
      - "127.0.0.1:8001:8001"

  worker-data:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: worker-data
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "data"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-backtest:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: worker-backtest
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "backtest"]
    depends_on:
      redis:
        condition: service_healthy

  worker-ml:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: worker-ml
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "ml"]
    depends_on:
      redis:
        condition: service_healthy

  worker-rl:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: worker-rl
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "rl"]
    depends_on:
      redis:
        condition: service_healthy

  worker-reports:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: worker-reports
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "gates"]
    depends_on:
      redis:
        condition: service_healthy

  # Dedicated worker for the dashboard-driven live/demo trading loop. A demo session is a
  # long-lived loop, so it gets its own worker (it must never block — or be blocked by —
  # backtest/data/gate jobs); the dashboard Start/Stop/Reset controls drive it end to end.
  worker-live:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: worker-live
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "live"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  scheduler:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: scheduler
      # DISABLED: the periodic scheduler is off so nothing auto-enqueues recurring jobs
      # (paper sessions / strategy validations that silently add dashboard trades). Re-enable
      # by setting SCHEDULER_ENABLED=true (and the relevant ENABLE_* toggle) when you actually
      # want background research running. With it false the service idles (it never ticks).
      SCHEDULER_ENABLED: "false"
    # Periodic recurring jobs (research re-validation, paper sessions, ML shadow passes),
    # gated by the enable_* toggles. It only enqueues; the dedicated workers consume.
    command: ["python", "-m", "src.cli.main", "scheduler"]
    depends_on:
      redis:
        condition: service_healthy

  trading-engine-paper:
    <<: *app-build
    environment:
      <<: *app-env
      SERVICE_NAME: trading-engine-paper
      TRADING_MODE: PAPER
    # Dedicated process (B.13). Serves the default queue alongside the scheduler.
    command: ["python", "-m", "src.cli.main", "worker", "--queues", "default"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # CONTINUOUS PAPER-TRADING of the promoted ensemble on LIVE data (REST-polled closed bars).
  # Profiled `paper` so a plain `docker compose up` does NOT start it — opt in on the VPS with
  # `docker compose --profile paper up -d paper-live`. PAPER mode = offline SimulatedVenue (NO real
  # funds, no keys). `--multi-strategy` runs only REAL-DATA-validated promoted strategies (a
  # reference/synthetic candidate can never trade here); with nothing promoted the feed simply has
  # no candidates (safe no-op). NOTE: the loop runs ONE timeframe — run one paper-live per timeframe
  # that has promoted strategies (PAPER_TIMEFRAME). restart keeps it up across transient faults.
  paper-live:
    <<: *app-build
    profiles: ["paper"]
    restart: unless-stopped
    environment:
      <<: *app-env
      SERVICE_NAME: paper-live
      TRADING_MODE: PAPER
    command:
      - python
      - -m
      - src.cli.main
      - live
      - --mode
      - paper
      - --realtime
      - --transport
      - rest
      - --multi-strategy
      - --poll-sec
      - "${PAPER_POLL_SEC:-60}"
      - --timeframe
      - "${PAPER_TIMEFRAME:-4h}"
      - --config
      - "${PAPER_DATA_CONFIG:-configs/data.bybit.yaml}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # DISABLED BY DEFAULT — only starts with `--profile live` AND a production,
  # explicitly live-enabled config (see src.config.Settings safety validator).
  trading-engine-live:
    <<: *app-build
    profiles: ["live"]
    environment:
      <<: *app-env
      SERVICE_NAME: trading-engine-live
    command: ["python", "-m", "src.cli.main", "config"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # TLS-terminating reverse proxy for PRODUCTION/VPS only. It sits behind the `proxy`
  # compose profile, so a plain `docker compose up` (local dev) does NOT start it — locally
  # the dashboard is reached directly on the loopback-published port below, and the VPS host
  # already runs its own routing. Start it on the VPS with `docker compose --profile proxy up`.
  # (Kept defined so the INFRA gate's required-services + only-443-external checks still pass.)
  caddy:
    profiles: ["proxy"]
    restart: unless-stopped
    image: caddy:2-alpine
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    # The ONLY publicly published port in the stack (deliverable: only 443).
    ports:
      - "443:443"

# Single private bridge network; services reach each other by name. Nothing is
# reachable from outside except Caddy:443 (and loopback-bound postgres/redis).
networks:
  default:
    name: trading-bot-internal
    driver: bridge

volumes:
  pgdata:
  caddydata:
  lakedata:      # shared parquet data lake (var/datalake, artifacts, backups) — all app services
  reportsdata:   # shared report artifacts (reports/) — all app services
